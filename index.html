<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ISS Tracker</title>  
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
        <link rel="stylesheet" href="styles.css">       
         
    </head>
    <body>
        <div class="dashboard-wrapper">
            <button id="mobile-sidebar-toggle" class="mobile-toggle-btn">☰</button>
            <div id="sidebar" class="sidebar">
                
                <nav class="nav-rail">
                    <div class="nav-rail-top">
                        <div id="sidebar-toggle" class="nav-icon toggle-btn">◀</div>
                        
                    </div>
                    <div class="nav-rail-bottom">
                        
                    </div>
                </nav>

                <div class="sidebar-panel">

                    <section class="panel-section">
                        <h3 class="section-title">ISS Information</h3>
                        
                    </section>
                    <hr class="divider">

                    <section class="panel-section">
                        <div class="live-indicator"> LIVE</div>
                        <h3 class="section-title">Position</h3> 
                        <div class="data-row">
                            <span class="data-label">Latitude</span>
                            <span id="lat-val" class="data-value"></span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Longitude</span>
                            <span id="lng-val" class="data-value"></span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Last Updated</span>
                            <span id="time" class="data-value"></span>
                        </div>
                        <p id="time"></p>

                        <h3 class="section-title">Orbit Data</h3> 
                        <div class="data-row">
                            <span class="data-label">Altitude</span>
                            <span id="altitude-val" class="data-value"></span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Velovity</span>
                            <span id="velocity-val" class="data-value"></span>
                        </div>

                        <h3 class="section-title">Coverage</h3>
                        <div class="data-row">
                            <span class="data-label">Visibility</span>
                            <span id="visibility-val" class="data-value"></span>
                        </div>
                        <div class="data-row">
                            <span class="data-label">Coverage Radius(Earth Surface)</span>
                            <span id="footprint-val" class="data-value"></span>
                        </div>
                
                        <label style="display:flex; gap:8px; align-items:center;">
                            <input type="checkbox" id="toggle-footprint">
                            Coverage Area
                        </label>
                    </section>
                </div>
            </div>            

        
            <div id="map-area">
                <div id="map"></div>
                <div class="coords-panel">
                    <div class="coords-content">
                        <button id="moveToSatellite"><img src="icons/iss_icon.png"></button>                
                    </div>
                </div>
            </div>
        </div>
    
        
        
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script src="index.js"></script>
    </body>
</html>
